name: Deploy CV and nightly PDF

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install RenderCV
        run: pip install "rendercv[full]==2.8"

      - name: Render CV
        run: |
          rendercv render Sepehr_Laal_CV.yaml --dont-generate-png

      - name: Replace nightly PDF release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete nightly --yes --cleanup-tag || true
          gh release create nightly \
            rendercv_output/Sepehr_Laal_CV.pdf \
            --title "Nightly CV PDF" \
            --notes "Latest PDF from main (replaced on every push)." \
            --target "$GITHUB_SHA"

      - name: Prepare GitHub Pages
        run: |
          mkdir -p site
          cp rendercv_output/Sepehr_Laal_CV.html site/index.html
          npx tsx scripts/enhance-site-html.ts site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
